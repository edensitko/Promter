name: ecommerce-modern
description: A sleek e-commerce storefront with multiple UI styles and rich animation combinations for a premium shopping experience.
category: ecommerce

prompts:
  # Core layout — always included
  - layouts/ecommerce-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/minimal-ui.md
        - ui/dark-ui.md
        - ui/gradient-ui.md
        - ui/glassmorphism-ui.md
        - ui/claymorphism-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/hover-effects.md
        - animations/animated-cards.md
        - animations/scroll-animations.md
        - animations/loading-animations.md
        - animations/animated-buttons.md
        - animations/microinteractions.md
        - animations/stagger-animations.md
        - animations/cursor-effects.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: advanced
  estimated_components: 22
  tags:
    - ecommerce
    - online-store
    - product-cards
    - shopping
    - randomized
