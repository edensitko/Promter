name: food-delivery
description: A mouth-watering food delivery app with multiple vibrant UI styles, playful animations, and a seamless ordering experience.
category: ecommerce

prompts:
  - pick_one:
      - layouts/ecommerce-layout.md
      - layouts/landing-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/claymorphism-ui.md
        - ui/gradient-ui.md
        - ui/organic-ui.md
        - ui/minimal-ui.md
        - ui/retro-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/microinteractions.md
        - animations/hover-effects.md
        - animations/scroll-animations.md
        - animations/stagger-animations.md
        - animations/animated-cards.md
        - animations/liquid-animations.md
        - animations/loading-animations.md
        - animations/animated-buttons.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 24
  tags:
    - food
    - delivery
    - restaurant
    - ordering
    - menu
    - cuisine
    - takeout
    - uber-eats
    - doordash
