name: freelancer-marketplace
description: A professional freelancer marketplace with multiple UI styles, interactive profile animations, and immersive card effects.
category: ecommerce

prompts:
  - pick_one:
      - layouts/ecommerce-layout.md
      - layouts/social-feed-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/minimal-ui.md
        - ui/glassmorphism-ui.md
        - ui/gradient-ui.md
        - ui/aurora-ui.md
        - ui/claymorphism-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/microinteractions.md
        - animations/stagger-animations.md
        - animations/animated-cards.md
        - animations/morphing-animations.md
        - animations/cursor-effects.md
        - animations/loading-animations.md

  - pick_one:
      - 3d/3d-card.md
      - 3d/3d-background.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: advanced
  estimated_components: 28
  tags:
    - freelancer
    - marketplace
    - gig
    - hire
    - talent
    - freelance
    - upwork
    - fiverr
    - services
    - portfolio
