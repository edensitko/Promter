name: photography-portfolio
description: A photography portfolio with multiple UI styles and varied animation pairings for a unique visual showcase.
category: portfolio

prompts:
  # Core layout
  - layouts/gallery-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/dark-ui.md
        - ui/minimal-ui.md
        - ui/brutalist-ui.md
        - ui/organic-ui.md
        - ui/art-deco-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/hover-effects.md
        - animations/page-transitions.md
        - animations/scroll-animations.md
        - animations/text-animations.md
        - animations/stagger-animations.md
        - animations/cursor-effects.md
        - animations/liquid-animations.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 14
  tags:
    - photography
    - portfolio
    - gallery
    - randomized
