name: nft-marketplace
description: A cutting-edge NFT marketplace with multiple UI styles, rich animations, and 3D elements for an immersive Web3 experience.
category: ecommerce

prompts:
  # Core layout
  - layouts/ecommerce-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/glassmorphism-ui.md
        - ui/dark-ui.md
        - ui/futuristic-ui.md
        - ui/gradient-ui.md
        - ui/cyberpunk-ui.md
        - ui/aurora-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/hover-effects.md
        - animations/animated-cards.md
        - animations/scroll-animations.md
        - animations/loading-animations.md
        - animations/animated-buttons.md
        - animations/particle-effects.md
        - animations/cursor-effects.md
        - animations/stagger-animations.md
        - animations/morphing-animations.md

  # 3D element — randomly pick one
  - pick_one:
      - 3d/3d-card.md
      - 3d/3d-background.md
      - 3d/3d-text.md
      - 3d/3d-particles.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: advanced
  estimated_components: 24
  tags:
    - nft
    - marketplace
    - web3
    - randomized
    - 3d
