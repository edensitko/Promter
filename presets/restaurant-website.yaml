name: restaurant-website
description: An elegant restaurant website with multiple UI styles, extra layout options, and varied animations for a warm, appetizing experience.
category: landing

prompts:
  # Core layout
  - layouts/landing-layout.md
  - layouts/routing.md

  # Extra layout — randomly pick one
  - pick_one:
      - layouts/gallery-layout.md
      - layouts/bento-grid-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/neumorphism-ui.md
        - ui/modern-ui.md
        - ui/minimal-ui.md
        - ui/retro-ui.md
        - ui/organic-ui.md
        - ui/art-deco-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/animated-cards.md
        - animations/loading-animations.md
        - animations/stagger-animations.md
        - animations/microinteractions.md
        - animations/text-animations.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 16
  tags:
    - restaurant
    - food
    - randomized
