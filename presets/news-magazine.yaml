name: news-magazine
description: A content-rich news and magazine publication with multiple editorial UI styles, rich typography animations, and smooth reading experience.
category: specialized

prompts:
  - layouts/magazine-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/minimal-ui.md
        - ui/modern-ui.md
        - ui/dark-ui.md
        - ui/retro-ui.md
        - ui/art-deco-ui.md
        - ui/organic-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/stagger-animations.md
        - animations/text-animations.md
        - animations/hover-effects.md
        - animations/loading-animations.md
        - animations/page-transitions.md
        - animations/microinteractions.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 22
  tags:
    - news
    - magazine
    - publication
    - editorial
    - article
    - blog
    - journalism
    - media
    - content
