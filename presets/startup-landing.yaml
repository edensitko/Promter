name: startup-landing
description: A modern startup landing page with multiple UI styles and rich animations for varied, high-impact results every generation.
category: landing

prompts:
  # Core layout — always included
  - layouts/landing-layout.md
  - layouts/routing.md

  # Extra layout element — randomly pick one
  - pick_one:
      - layouts/bento-grid-layout.md
      - layouts/saas-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/minimal-ui.md
        - ui/gradient-ui.md
        - ui/glassmorphism-ui.md
        - ui/aurora-ui.md
        - ui/claymorphism-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/animated-buttons.md
        - animations/text-animations.md
        - animations/page-transitions.md
        - animations/stagger-animations.md
        - animations/microinteractions.md
        - animations/cursor-effects.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 15
  tags:
    - startup
    - landing-page
    - randomized
    - bento-grid
    - scroll-animations
