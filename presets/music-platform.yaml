name: music-platform
description: A sleek music streaming platform with multiple UI styles, immersive audio-driven visuals, and atmospheric 3D elements.
category: specialized

prompts:
  - layouts/music-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/dark-ui.md
        - ui/cyberpunk-ui.md
        - ui/aurora-ui.md
        - ui/gradient-ui.md
        - ui/glassmorphism-ui.md
        - ui/vaporwave-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/microinteractions.md
        - animations/stagger-animations.md
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/cursor-effects.md
        - animations/particle-effects.md
        - animations/morphing-animations.md
        - animations/liquid-animations.md

  - pick_one:
      - 3d/3d-particles.md
      - 3d/3d-background.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: advanced
  estimated_components: 30
  tags:
    - music
    - streaming
    - player
    - audio
    - playlist
    - album
    - artist
    - spotify
    - sound
