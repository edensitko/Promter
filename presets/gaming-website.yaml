name: gaming-website
description: An immersive gaming and esports website with multiple UI styles, dual 3D elements, and dynamic animation combos.
category: landing

prompts:
  # Core layout
  - layouts/landing-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/futuristic-ui.md
        - ui/dark-ui.md
        - ui/gradient-ui.md
        - ui/cyberpunk-ui.md
        - ui/vaporwave-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/animated-cards.md
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/text-animations.md
        - animations/page-transitions.md
        - animations/particle-effects.md
        - animations/cursor-effects.md
        - animations/stagger-animations.md

  # 3D element — randomly pick one
  - pick_one:
      - 3d/3d-hero.md
      - 3d/3d-background.md
      - 3d/3d-particles.md

  # Extra 3D element — randomly pick one
  - pick_one:
      - 3d/3d-card.md
      - 3d/3d-text.md
      - 3d/3d-morphing.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: advanced
  estimated_components: 22
  tags:
    - gaming
    - esports
    - randomized
    - 3d
