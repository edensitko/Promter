name: developer-portfolio
description: A developer portfolio with multiple dark and edgy UI styles, varied animation effects for a unique personal brand.
category: portfolio

prompts:
  # Core layout — always included
  - layouts/portfolio-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/dark-ui.md
        - ui/futuristic-ui.md
        - ui/brutalist-ui.md
        - ui/minimal-ui.md
        - ui/cyberpunk-ui.md
        - ui/vaporwave-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/hover-effects.md
        - animations/animated-cards.md
        - animations/scroll-animations.md
        - animations/text-animations.md
        - animations/page-transitions.md
        - animations/cursor-effects.md
        - animations/stagger-animations.md
        - animations/particle-effects.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 16
  tags:
    - developer
    - portfolio
    - randomized
    - projects
