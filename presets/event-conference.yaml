name: event-conference
description: A dynamic event and conference website with multiple UI styles, countdown animations, speaker showcases, and eye-catching effects.
category: landing

prompts:
  - layouts/event-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/gradient-ui.md
        - ui/futuristic-ui.md
        - ui/glassmorphism-ui.md
        - ui/cyberpunk-ui.md
        - ui/aurora-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/stagger-animations.md
        - animations/text-animations.md
        - animations/hover-effects.md
        - animations/particle-effects.md
        - animations/animated-buttons.md
        - animations/microinteractions.md
        - animations/cursor-effects.md
        - animations/morphing-animations.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 24
  tags:
    - event
    - conference
    - summit
    - meetup
    - speakers
    - schedule
    - tickets
    - agenda
    - countdown
