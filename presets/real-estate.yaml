name: real-estate
description: A modern real estate listing website with multiple UI styles, interactive animations, and an immersive 3D globe for location exploration.
category: specialized

prompts:
  - layouts/real-estate-layout.md
  - 3d/3d-globe.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/minimal-ui.md
        - ui/organic-ui.md
        - ui/glassmorphism-ui.md
        - ui/claymorphism-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/hover-effects.md
        - animations/microinteractions.md
        - animations/stagger-animations.md
        - animations/animated-cards.md
        - animations/loading-animations.md
        - animations/cursor-effects.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: intermediate
  estimated_components: 25
  tags:
    - real-estate
    - property
    - listing
    - house
    - apartment
    - map
    - agent
    - mortgage
    - home
