name: agency-website
description: A visually striking creative agency website with multiple UI styles and rich animation effects for a unique presentation.
category: landing

prompts:
  # Core layout — always included
  - layouts/landing-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/glassmorphism-ui.md
        - ui/gradient-ui.md
        - ui/modern-ui.md
        - ui/futuristic-ui.md
        - ui/aurora-ui.md
        - ui/vaporwave-ui.md
        - ui/art-deco-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/page-transitions.md
        - animations/text-animations.md
        - animations/hover-effects.md
        - animations/animated-buttons.md
        - animations/cursor-effects.md
        - animations/stagger-animations.md
        - animations/liquid-animations.md
        - animations/morphing-animations.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: advanced
  estimated_components: 18
  tags:
    - agency
    - creative
    - randomized
