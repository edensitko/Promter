name: education-platform
description: An engaging online education platform with multiple playful yet professional UI styles and delightful learning interactions.
category: specialized

prompts:
  - pick_one:
      - layouts/dashboard-layout.md
      - layouts/saas-layout.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/modern-ui.md
        - ui/claymorphism-ui.md
        - ui/minimal-ui.md
        - ui/gradient-ui.md
        - ui/organic-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/microinteractions.md
        - animations/stagger-animations.md
        - animations/loading-animations.md
        - animations/animated-cards.md
        - animations/hover-effects.md
        - animations/text-animations.md
        - animations/morphing-animations.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: false

metadata:
  difficulty: intermediate
  estimated_components: 24
  tags:
    - education
    - learning
    - course
    - online
    - student
    - teacher
    - lms
    - e-learning
    - school
