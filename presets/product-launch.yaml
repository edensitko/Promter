name: product-launch
description: A high-impact product launch page with multiple UI styles, rich animations, and 3D elements for maximum visual impact.
category: landing

prompts:
  # Core layout
  - layouts/landing-layout.md
  - layouts/routing.md

  # UI styles — randomly pick 2
  - pick_n:
      count: 2
      from:
        - ui/gradient-ui.md
        - ui/modern-ui.md
        - ui/glassmorphism-ui.md
        - ui/futuristic-ui.md
        - ui/cyberpunk-ui.md
        - ui/aurora-ui.md

  # Animations — randomly pick 3
  - pick_n:
      count: 3
      from:
        - animations/scroll-animations.md
        - animations/animated-buttons.md
        - animations/hover-effects.md
        - animations/text-animations.md
        - animations/page-transitions.md
        - animations/particle-effects.md
        - animations/cursor-effects.md
        - animations/stagger-animations.md
        - animations/morphing-animations.md

  # 3D element — randomly pick one
  - pick_one:
      - 3d/3d-product-viewer.md
      - 3d/3d-hero.md
      - 3d/3d-card.md
      - 3d/3d-morphing.md

settings:
  primary_framework: Next.js
  css_framework: Tailwind CSS
  animations: true
  3d_elements: true

metadata:
  difficulty: advanced
  estimated_components: 20
  tags:
    - product-launch
    - randomized
    - 3d
